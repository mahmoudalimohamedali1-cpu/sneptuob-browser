name: Build Sneptuob

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner'
        required: true
        type: string
        default: 'ubuntu-latest'
  schedule:
    - cron: '0 0 */16 * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Update Vanadium
        run: |
          cd vanadium
          git fetch --tags
          git checkout $(git tag | sort -V | tail -n1)
          cd ..
          git add vanadium
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff --staged --quiet; then
            git commit -am "update vanadium"
            git push
          fi

      - name: Free disk space aggressively
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/share/swift /usr/local/graalvm /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache /opt/az /usr/share/az_* /usr/local/julia*
          sudo rm -rf /usr/local/share/powershell /usr/share/miniconda /usr/lib/jvm
          sudo rm -rf /usr/share/kotlinc /usr/share/gradle* /usr/share/sbt
          sudo rm -rf /usr/local/share/vcpkg /usr/local/share/chromium
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli google-cloud-sdk google-chrome-stable firefox mono-devel '^temurin-.*' '^mysql-.*' '^postgresql-.*' || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          echo "=== Disk space after cleanup ==="
          df -h /

      - name: Setup swap for extra memory
        run: |
          sudo fallocate -l 8G /mnt/swapfile
          sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile
          sudo swapon /mnt/swapfile
          echo "=== Memory ==="
          free -h

      - name: Set ENV
        run: |
          chmod +x *.sh
          echo "unix_time=$(date +%s)" >> $GITHUB_ENV

      - name: Build Sneptuob
        env:
            DEBIAN_FRONTEND: noninteractive
            LOCAL_TEST_JKS: ${{ secrets.LOCAL_TEST_JKS }}
            STORE_TEST_JKS: ${{ secrets.STORE_TEST_JKS }}
        run: |
          ./build.sh

      - name: Prepare Release
        run: |
          export VERSION=$(find chromium/src/out/Default/apks/release -name '*.apk' | sed 's/.*\///;s/\.apk$//' | sed 's/Sneptuob-//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mv $(find chromium/src/out/Default/apks/release -name '*.apk') Sneptuob-$VERSION-${{ env.unix_time }}.apk

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: Sneptuob v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          body: |
            Sneptuob Browser v${{ env.VERSION }}

            Based on Chromium ${{ env.VERSION }} with:
            - Native Chrome Extension support (MV2 + MV3)
            - Chrome Web Store compatibility
            - Extension toolbar on phone layout
            - Vanadium security patches
          files: |
            Sneptuob-${{ env.VERSION }}-${{ env.unix_time }}.apk
